<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist TODO App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
        <h1>Focus TODO</h1>
      </div>
      <p class="subtitle">シンプルで高効率なタスク管理</p>
    </header>

    <main class="app-main">
      <!-- Input Section -->
      <form id="todo-form" class="todo-form">
        <div class="input-wrapper">
          <input type="text" id="todo-input" placeholder="新しいタスクを入力..." autocomplete="off" required>
          <button type="submit" class="btn-add">
            <span>追加</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
      </form>

      <!-- Filter Controls -->
      <div class="controls-bar">
        <div class="filters" id="filters">
          <button type="button" class="filter-btn active" data-filter="all">すべて</button>
          <button type="button" class="filter-btn" data-filter="active">未完了</button>
          <button type="button" class="filter-btn" data-filter="completed">完了済み</button>
        </div>
        <div class="counter" id="todo-counter">0 件のタスク</div>
        <button type="button" id="btn-clear-completed" class="btn-clear-all">完了済みを削除</button>
        <button type="button" id="btn-clear-all" class="btn-clear-all">全削除</button>
      </div>

      <!-- Task List Container -->
      <ul id="todo-list" class="todo-list">
        <!-- JS will populate task items here -->
      </ul>

      <!-- Empty State Placeholder -->
      <div id="empty-state" class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 12h8"></path>
        </svg>
        <p>タスクがありません。新しいタスクを追加してください。</p>
      </div>
    </main>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
